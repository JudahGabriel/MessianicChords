name: Build and deploy MessianicChords

on:
  push:
    branches:
      - master
  workflow_dispatch:
  
# If this workflow is already running, cancel it.
concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ClientApp/package-lock.json

      - name: Run NPM install and build
        shell: pwsh
        env:
          CI: true
        run: |
          Set-Location src/ClientApp
          if (Test-Path package-lock.json) {
            npm ci
          }
          else {
            npm install
          }
          npm run build
          Set-Location ../..
      
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Print .NET SDK info
        run: dotnet --info
                    
      - name: Write appsettings.Production.json
        shell: pwsh
        env:
          APPSETTINGS_PRODUCTION: ${{ secrets.APPSETTINGSPRODUCTION }}
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE 'src/appsettings.Production.json'
          Set-Content -Path $path -Value $env:APPSETTINGS_PRODUCTION -NoNewline

      - name: Restore with explicit framework
        run: dotnet restore src/MessianicChords.csproj -p:TargetFramework=net10.0
          
      - name: Build with dotnet
        run: dotnet build src/MessianicChords.csproj --configuration Release -p:TargetFramework=net10.0 --no-restore
          
      - name: Write publish profile to directory
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.PUBLISH_PROFILE }}
        run: |
          $publishProfilePath = Join-Path $env:RUNNER_TEMP 'MessianicChordsOnVm.pubxml'
          Set-Content -Path $publishProfilePath -Value $env:PUBLISH_PROFILE -NoNewline
          
      - name: dotnet publish
        run: dotnet publish src/MessianicChords.csproj -c Release -o Publish -p:TargetFramework=net10.0 -p:PublishProfileFullPath=${{ runner.temp }}/MessianicChordsOnVm.pubxml -p:DeleteExistingFiles=true --no-build
